<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AXIOM — AI Portfolio Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050A0F;font-family:'Syne',sans-serif;color:#E8F4F8;min-height:100vh}
.app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #0D2535;border-right:1px solid #0D2535}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #0D2535;background:#060E18;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#0D3B6E,#185FA5);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-size:20px;font-weight:800;letter-spacing:3px;color:#00D4FF}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2A6B8A;letter-spacing:2px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:12px}
.status-pill{display:flex;align-items:center;gap:6px;background:rgba(0,255,128,0.07);border:1px solid rgba(0,255,128,0.18);border-radius:20px;padding:4px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#00CC66}
.dot{width:6px;height:6px;background:#00CC66;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.key-btn{background:none;border:1px solid #0D2535;border-radius:8px;cursor:pointer;font-size:14px;padding:5px 10px;color:#5AAFCF;transition:all 0.15s}
.key-btn:hover{border-color:#00D4FF44;color:#00D4FF}
.key-panel{display:flex;align-items:center;gap:10px;padding:10px 24px;background:#071520;border-bottom:1px solid #0D2535;flex-wrap:wrap}
.key-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:#5AAFCF;white-space:nowrap}
.key-input{flex:1;min-width:220px;background:#050A0F;border:1px solid #1A4060;border-radius:8px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#E8F4F8;outline:none}
.key-input:focus{border-color:#00D4FF55}
.key-save{font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 14px;background:#185FA5;border:none;color:white;border-radius:8px;cursor:pointer}
.key-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:#5AAFCF;text-decoration:none;white-space:nowrap}
.key-link:hover{color:#00D4FF}
.tabs{display:flex;border-bottom:1px solid #0D2535;background:#060E18;flex-shrink:0}
.tab{flex:1;padding:13px;font-family:'JetBrains Mono',monospace;font-size:12px;border:none;background:none;color:#2A6B8A;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:#00D4FF;border-bottom-color:#00D4FF}
.tab:hover:not(.active){color:#5AAFCF}
.quick-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid #0D2535;background:#060E18;flex-shrink:0}
.quick-row::-webkit-scrollbar{height:0}
.qbtn{white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 11px;background:#071520;border:1px solid #0D2535;color:#5AAFCF;border-radius:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.qbtn:hover{background:#0D2535;color:#00D4FF;border-color:#00D4FF33}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;min-height:400px}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#0D2535;border-radius:2px}
.msg{display:flex;gap:12px;max-width:88%;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:#071520;border:1px solid #0D2535}
.bubble{background:#071520;border:1px solid #0D2535;border-radius:13px;padding:12px 16px;font-size:14px;line-height:1.7;color:#C8E0EA;max-width:100%}
.msg.user .bubble{background:#0A2A45;border-color:#1A4060;color:#E8F4F8}
.bubble p{margin-bottom:5px}
.bubble p:last-child{margin-bottom:0}
.bubble strong{color:#00D4FF;font-weight:700}
.bubble em{color:#A0CCE0}
.bubble code{font-family:'JetBrains Mono',monospace;font-size:11px;background:#0D2535;padding:1px 6px;border-radius:4px;color:#00FF80}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0}
.bubble li{margin-bottom:3px}
.dots{display:flex;gap:5px;align-items:center;padding:6px 0}
.dots span{width:5px;height:5px;background:#00D4FF;border-radius:50%;animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1.2);opacity:1}}
.input-row{display:flex;gap:10px;padding:14px 24px 20px;border-top:1px solid #0D2535;background:#060E18;flex-shrink:0}
#msg-input{flex:1;background:#071520;border:1px solid #0D2535;border-radius:12px;padding:10px 16px;font-family:'Syne',sans-serif;font-size:14px;color:#E8F4F8;outline:none;resize:none;min-height:44px;max-height:100px;transition:border-color 0.15s}
#msg-input:focus{border-color:#00D4FF33}
#msg-input::placeholder{color:#1A4060}
.send-btn{width:44px;height:44px;flex-shrink:0;background:linear-gradient(135deg,#0D5FA5,#185FA5);border:none;border-radius:12px;cursor:pointer;color:white;font-size:16px;transition:all 0.15s}
.send-btn:hover:not(:disabled){transform:scale(1.04)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.port-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:#071520;border:1px solid #0D2535;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#00D4FF}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2A6B8A;margin-top:3px}
.section-block{display:flex;flex-direction:column;gap:10px}
.section-hdr{display:flex;align-items:center;justify-content:space-between}
.section-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A6B8A;letter-spacing:1px}
.add-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);color:#00D4FF;border-radius:8px;cursor:pointer}
.risk-row{display:flex;gap:8px}
.risk-opt{flex:1;padding:9px;border:1px solid #0D2535;border-radius:10px;text-align:center;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A6B8A;background:#050A0F;transition:all 0.15s}
.risk-opt.active-conservative{border-color:#00CC66!important;color:#00CC66;background:rgba(0,204,102,0.06)}
.risk-opt.active-moderate{border-color:#FFA500!important;color:#FFA500;background:rgba(255,165,0,0.06)}
.risk-opt.active-aggressive{border-color:#FF4444!important;color:#FF4444;background:rgba(255,68,68,0.06)}
.add-form{background:#071520;border:1px solid #0D2535;border-radius:13px;padding:16px;display:flex;flex-direction:column;gap:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#2A6B8A}
.form-input,.form-select{background:#050A0F;border:1px solid #0D2535;border-radius:8px;padding:7px 11px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#E8F4F8;outline:none;width:100%}
.form-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 16px;background:none;border:1px solid #0D2535;color:#5AAFCF;border-radius:8px;cursor:pointer}
.btn-ok{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 16px;background:#185FA5;border:none;color:white;border-radius:8px;cursor:pointer;font-weight:600}
.holdings-list{display:flex;flex-direction:column;gap:7px}
.holding-card{display:flex;align-items:center;gap:12px;background:#071520;border:1px solid #0D2535;border-radius:11px;padding:12px 16px}
.h-ticker{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:#00D4FF;min-width:65px}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:5px}
.h-badge.penny{background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.22);color:#FFA500}
.h-badge.regular{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);color:#00D4FF}
.h-detail{flex:1;font-size:13px;color:#5AAFCF}
.h-cur{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A6B8A}
.h-del{background:none;border:none;color:#1A4060;cursor:pointer;font-size:14px;padding:3px 6px;transition:color 0.15s}
.h-del:hover{color:#FF4444}
.empty{text-align:center;padding:28px;color:#1A4060;font-size:13px;font-family:'JetBrains Mono',monospace}
@media(max-width:600px){
  .header{padding:12px 16px}
  .chat-area,.port-area{padding:14px 16px}
  .quick-row,.input-row{padding:10px 16px}
  .stats-row{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .risk-row{flex-direction:column}
  .msg{max-width:96%}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div>
        <div class="logo-name">AXIOM</div>
        <div class="logo-sub">AI PORTFOLIO INTELLIGENCE</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill"><div class="dot"></div> LIVE</div>
      <button class="key-btn" onclick="toggleKeyPanel()">⚙️ API Key</button>
    </div>
  </div>

  <div id="key-panel" style="display:none" class="key-panel">
    <span class="key-label">Anthropic API Key:</span>
    <input class="key-input" id="api-key-input" type="password" placeholder="sk-ant-..."/>
    <button class="key-save" onclick="saveKey()">Save</button>
    <a class="key-link" href="https://console.anthropic.com/keys" target="_blank">Get key ↗</a>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-chat" onclick="switchTab('chat')">💬 Analyst Chat</button>
    <button class="tab" id="tab-port" onclick="switchTab('portfolio')">📂 Portfolio (<span id="holding-count">0</span>)</button>
  </div>

  <div id="chat-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="quick-row" id="quick-row"></div>
    <div class="chat-area" id="chat-area"></div>
    <div class="input-row">
      <textarea id="msg-input" placeholder="Ask AXIOM anything… 'What should I buy this week?'" rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <div id="port-panel" style="display:none;overflow-y:auto">
    <div class="port-area" id="port-area"></div>
  </div>
</div>

<script>
const PKEY='axiom_port_v3',AKEY='axiom_apikey';
let portfolio=(() => {try{return JSON.parse(localStorage.getItem(PKEY))||{holdings:[],risk:'Moderate',invested:0};}catch{return{holdings:[],risk:'Moderate',invested:0};}})();
let apiKey=localStorage.getItem(AKEY)||'';
let messages=[],loading=false,showForm=false;

const SYS=`You are AXIOM — an elite AI stock market analyst and portfolio manager with expertise in regular stocks (NYSE, NASDAQ, TSX) and penny stocks in both USD and CAD.

For EVERY buy recommendation always include:
- Recommended quantity
- Entry price range (e.g. "Buy between $X.XX–$X.XX")
- Stop-loss price
- Target sell range
- Expected profit % and timeline
- Confidence score (0–100%)
- Risk level (Low/Medium/High/Very High)
- Currency (USD or CAD)

Penny stock rules: never >15% of portfolio in one penny stock, always flag liquidity risk and pump-and-dump signs.
Use **bold** for headers. Be direct and specific. End daily updates with market mood: Bearish 🔴 / Neutral 🟡 / Bullish 🟢.`;

const QUICK=[
  {l:'📊 Sunday Report',m:'Give me the full Sunday weekly buy/sell report with top picks and full analysis.'},
  {l:'🌅 Morning Update',m:'Good morning! Daily market update and portfolio sentiment review.'},
  {l:'📉 Review Holdings',m:'Review all my current holdings — hold, sell, or add?'},
  {l:'💎 Top Penny Stocks',m:'Top 3 penny stocks this week with full entry/exit details.'},
  {l:'🇨🇦 CAD Picks',m:'Best Canadian TSX stocks to buy this week.'},
  {l:'⚡ Momentum Plays',m:'Strongest momentum stocks right now for short-term plays.'},
];

function save(){try{localStorage.setItem(PKEY,JSON.stringify(portfolio));}catch{}}
function saveKey(){apiKey=document.getElementById('api-key-input').value.trim();localStorage.setItem(AKEY,apiKey);document.getElementById('key-panel').style.display='none';}
function toggleKeyPanel(){const p=document.getElementById('key-panel');p.style.display=p.style.display==='none'?'flex':'none';if(p.style.display==='flex')document.getElementById('api-key-input').value=apiKey;}
function switchTab(t){
  document.getElementById('tab-chat').className='tab'+(t==='chat'?' active':'');
  document.getElementById('tab-port').className='tab'+(t==='portfolio'?' active':'');
  document.getElementById('chat-panel').style.display=t==='chat'?'flex':'none';
  document.getElementById('port-panel').style.display=t==='portfolio'?'block':'none';
  if(t==='portfolio')renderPortfolio();
}
function portContext(){
  if(!portfolio.holdings.length)return'Portfolio: EMPTY';
  return`Portfolio (${portfolio.risk} risk):\n${portfolio.holdings.map(h=>`${h.ticker} (${h.type},${h.currency}): ${h.shares} shares @ $${h.avgPrice}${h.notes?' — '+h.notes:''}`).join('\n')}\nTotal invested: $${portfolio.invested.toFixed(0)}`;
}
function fmtBubble(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g,'')
    .replace(/\n/g,'<br>');
}
function addMsg(role,content){
  messages.push({role,content});
  const a=document.getElementById('chat-area');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="avatar">${role==='assistant'?'🤖':'👤'}</div><div class="bubble">${role==='assistant'?fmtBubble(content):content.replace(/</g,'&lt;')}</div>`;
  a.appendChild(d);a.scrollTop=a.scrollHeight;
}
function showLoading(){
  const a=document.getElementById('chat-area');
  const d=document.createElement('div');
  d.className='msg assistant';d.id='loading-msg';
  d.innerHTML='<div class="avatar">🤖</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  a.appendChild(d);a.scrollTop=a.scrollHeight;
}
async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||loading)return;
  if(!apiKey){toggleKeyPanel();addMsg('assistant','⚠️ Please enter your Anthropic API key first (click ⚙️ API Key).');return;}
  inp.value='';loading=true;
  document.getElementById('send-btn').disabled=true;
  addMsg('user',text);showLoading();
  const apiMsgs=messages.map((m,i)=>({role:m.role,content:i===messages.length-1&&m.role==='user'?`[PORTFOLIO]\n${portContext()}\n\n[USER]\n${m.content}`:m.content}));
  try{
    // Use local proxy to avoid CORS issues
    const res=await fetch('/api/proxy',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        system:SYS,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:apiMsgs
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.content.map(b=>b.type==='text'?b.text:'').filter(Boolean).join('\n');
    document.getElementById('loading-msg')?.remove();
    addMsg('assistant',reply);
  }catch(e){
    document.getElementById('loading-msg')?.remove();
    addMsg('assistant','⚠️ Error: '+e.message);
  }
  loading=false;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('msg-input').focus();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function renderPortfolio(){
  const pen=portfolio.holdings.filter(h=>h.type==='penny').length;
  document.getElementById('port-area').innerHTML=`
    <div class="stats-row">
      <div class="stat"><div class="stat-val">${portfolio.holdings.length}</div><div class="stat-lbl">HOLDINGS</div></div>
      <div class="stat"><div class="stat-val">$${portfolio.invested.toFixed(0)}</div><div class="stat-lbl">INVESTED</div></div>
      <div class="stat"><div class="stat-val">${pen}</div><div class="stat-lbl">PENNY STOCKS</div></div>
    </div>
    <div class="section-block">
      <div class="section-lbl">RISK PROFILE</div>
      <div class="risk-row">
        <button class="risk-opt ${portfolio.risk==='Conservative'?'active-conservative':''}" onclick="setRisk('Conservative')">🛡️ Conservative</button>
        <button class="risk-opt ${portfolio.risk==='Moderate'?'active-moderate':''}" onclick="setRisk('Moderate')">⚡ Moderate</button>
        <button class="risk-opt ${portfolio.risk==='Aggressive'?'active-aggressive':''}" onclick="setRisk('Aggressive')">🔥 Aggressive</button>
      </div>
    </div>
    <div class="section-block">
      <div class="section-hdr">
        <div class="section-lbl">MY HOLDINGS</div>
        <button class="add-btn" onclick="toggleForm()">+ Add Stock</button>
      </div>
      ${showForm?`<div class="add-form">
        <div class="form-grid">
          <div class="form-field"><label>TICKER</label><input class="form-input" id="f-ticker" placeholder="AAPL" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="form-field"><label>TYPE</label><select class="form-select" id="f-type"><option value="regular">Regular Stock</option><option value="penny">Penny Stock</option></select></div>
          <div class="form-field"><label>SHARES</label><input class="form-input" id="f-shares" type="number" placeholder="50"></div>
          <div class="form-field"><label>AVG PRICE ($)</label><input class="form-input" id="f-price" type="number" step="0.01" placeholder="145.50"></div>
          <div class="form-field"><label>CURRENCY</label><select class="form-select" id="f-cur"><option>USD</option><option>CAD</option></select></div>
          <div class="form-field"><label>NOTES</label><input class="form-input" id="f-notes" placeholder="Long-term hold"></div>
        </div>
        <div class="form-btns"><button class="btn-cancel" onclick="toggleForm()">Cancel</button><button class="btn-ok" onclick="addHolding()">Add Holding</button></div>
      </div>`:''}
      <div class="holdings-list">
        ${portfolio.holdings.length===0
          ?'<div class="empty">No holdings yet. Add your first stock above.</div>'
          :portfolio.holdings.map(h=>`<div class="holding-card">
            <div class="h-ticker">${h.ticker}</div>
            <div class="h-badge ${h.type}">${h.type==='penny'?'PENNY':'STOCK'}</div>
            <div class="h-detail">${h.shares} shares @ <strong>$${h.avgPrice}</strong>${h.notes?' · '+h.notes:''}</div>
            <div class="h-cur">${h.currency}</div>
            <button class="h-del" onclick="removeHolding('${h.ticker}')">✕</button>
          </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('holding-count').textContent=portfolio.holdings.length;
}
function setRisk(r){portfolio.risk=r;save();renderPortfolio();}
function toggleForm(){showForm=!showForm;renderPortfolio();}
function addHolding(){
  const t=document.getElementById('f-ticker').value.trim();
  const s=parseFloat(document.getElementById('f-shares').value);
  const p=parseFloat(document.getElementById('f-price').value);
  if(!t||!s||!p)return;
  portfolio.holdings.push({ticker:t,shares:s,avgPrice:p,type:document.getElementById('f-type').value,currency:document.getElementById('f-cur').value,notes:document.getElementById('f-notes').value,date:new Date().toISOString().split('T')[0]});
  portfolio.invested+=s*p;showForm=false;save();renderPortfolio();
}
function removeHolding(ticker){
  const h=portfolio.holdings.find(x=>x.ticker===ticker);
  if(h)portfolio.invested=Math.max(0,portfolio.invested-h.shares*h.avgPrice);
  portfolio.holdings=portfolio.holdings.filter(x=>x.ticker!==ticker);
  save();renderPortfolio();
}
const qr=document.getElementById('quick-row');
QUICK.forEach(q=>{
  const b=document.createElement('button');b.className='qbtn';b.textContent=q.l;
  b.onclick=()=>{document.getElementById('msg-input').value=q.m;document.getElementById('msg-input').focus();};
  qr.appendChild(b);
});
if(apiKey)document.getElementById('api-key-input').value=apiKey;
addMsg('assistant',`**AXIOM online** — AI Portfolio Intelligence System\n\nMarkets connected. Add your holdings in the Portfolio tab, set your risk profile, then ask me anything!\n\nTry a quick prompt above to get started.`);
</script>
</body>
</html>
